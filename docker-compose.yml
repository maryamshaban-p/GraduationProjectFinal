version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:18-alpine
    container_name: graduation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-graduation_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize database script (optional - for debugging)
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-graduation_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - graduation_network

  # ASP.NET Core Web API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graduation_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ASP.NET Core Configuration
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5132
      
      # Database Connection String
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME:-graduation_db};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres123};Include Error Detail=true"
      
      # Optional: Additional settings
      AllowedHosts: "*"
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft.AspNetCore: Warning
    ports:
      - "${API_PORT:-5000}:5132"
    networks:
      - graduation_network
    # Add a startup delay to ensure database is fully ready
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        dotnet $$(ls *.dll | head -n 1)
      "

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local

# Custom network
networks:
  graduation_network:
    driver: bridge